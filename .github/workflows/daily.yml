name: Quant Marketing Daily

on:
  schedule:
    # 北京时间 09:07；避开 GitHub Actions 整点高峰，降低 schedule 延迟/丢弃风险。
    - cron: "7 9 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: daily-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # 保留 data/ 和 output/ 的跨次运行状态
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Playwright 浏览器（MktSci 摘要有时会用到，CI 中headless 大概率被 Cloudflare 拦截，但保留以避免 import 报错）
          playwright install chromium

      - name: Check if Monday
        id: check-day
        run: |
          DAY=$(TZ=Asia/Shanghai date +%u)
          if [ "$DAY" = "1" ]; then
            echo "is_monday=true" >> $GITHUB_OUTPUT
          else
            echo "is_monday=false" >> $GITHUB_OUTPUT
          fi

      - name: Run daily pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          # CI 中强制 headless + 跳过 Playwright MktSci（Cloudflare 会拦截）
          INFORMS_PW_HEADLESS: "1"
        run: |
          if [ "${{ steps.check-day.outputs.is_monday }}" = "true" ]; then
            python -m src.fetch --rebuild
          else
            python -m src.fetch
          fi

      - name: Check SMTP config
        id: check-smtp
        run: |
          if [ -n "${{ secrets.SMTP_SERVER }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        if: steps.check-smtp.outputs.enabled == 'true'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python -m src.notify_email

      - name: Commit daily report & seen_dois
        run: |
          git config user.name "quant-marketing-daily[bot]"
          git config user.email "bot@quant-mkt-daily.local"

          git add output/ data/seen_dois.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily report $(TZ=Asia/Shanghai date +%Y-%m-%d)"
            git push origin main
          fi
