name: Send Daily Email

on:
  schedule:
    # 北京时间 09:07；发送凌晨已生成并提交的当天日报。
    - cron: "7 9 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: daily-email
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check SMTP config
        id: check-smtp
        run: |
          if [ -n "${{ secrets.SMTP_SERVER }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Send today's email notification
        if: steps.check-smtp.outputs.enabled == 'true'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python -m src.notify_email --today
